<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NextGen Solutions</title>
    <script>
      // Fix: Some libraries (like Socket.io or Firebase) attempt to overwrite window.fetch
      // in environments where it might be bound incorrectly. In the AI Studio preview,
      // window.fetch is a getter-only property. We attempt to add a silent setter 
      // to prevent "TypeError: Cannot set property fetch" crashes.
      (function() {
        try {
          const descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
          if (descriptor && descriptor.get && !descriptor.set) {
            Object.defineProperty(window, 'fetch', {
              get: descriptor.get,
              set: function() { 
                console.warn("An attempt to overwrite window.fetch was ignored to prevent a crash.");
              },
              configurable: true
            });
            console.log("Applied window.fetch safety guard.");
          }
        } catch (e) {
          console.error("Failed to apply fetch guard:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
